<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartVerse · 健康策略引擎</title>
    <!-- 原来的 CDN 替换为 -->
<script src="libs/echarts.min.js"></script>
    <style>
        /* ----- 全局重置 & 设计语言 ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: transparent;
            color: #0f1115;
            -webkit-font-smoothing: antialiased;
        }
        .engine-container {
            width: 100%;
            min-height: 100vh;
            padding: 30px 2% 60px;
            background: transparent;
            display: flex;
            flex-direction: column;
            gap: 48px;
        }

        /* 标题区 */
        .engine-header {
            border-bottom: 2px solid #0f1115;
            padding-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .engine-header .meta {
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            font-weight: 800;
            color: #ff3355;
            letter-spacing: 2px;
        }
        .engine-header h1 {
            font-size: 1.85rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin: 6px 0 10px 0;
        }
        .engine-header .sub {
            font-size: 1rem;
            color: #444;
            font-weight: 400;
        }
        .engine-header .risk-badge {
            background: rgba(255,51,85,0.08);
            padding: 8px 24px;
            border-radius: 30px;
            border: 1px solid rgba(255,51,85,0.2);
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        .engine-header .risk-badge .label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #444;
        }
        .engine-header .risk-badge .value {
            font-size: 2.4rem;
            font-weight: 900;
            color: #ff3355;
            line-height: 1;
        }
        .engine-header .risk-badge .unit {
            font-size: 1rem;
            font-weight: 800;
            color: #ff3355;
        }

        /* 通用卡片样式 */
        .strategy-card {
            background: rgba(238, 240, 246, 0.6);
            border: 1px solid rgba(15,17,21,0.06);
            border-radius: 12px;
            padding: 24px 28px;
            transition: all 0.25s;
        }
        .strategy-card .card-title {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: -0.3px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .strategy-card .card-title .badge {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 20px;
            background: #0f1115;
            color: #fff;
            letter-spacing: 0.5px;
        }
        .strategy-card .card-title .badge.primary { background: #ff3355; }
        .strategy-card .card-title .badge.green { background: #10ac84; }

        /* 网格布局 */
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
        }
        .grid-3col {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }
        .grid-4col {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        .full-width { grid-column: 1 / -1; }

        /* 图表容器 */
        .chart-box {
            width: 100%;
            height: 280px;
        }
        .chart-box.tall { height: 340px; }
        .chart-box.short { height: 200px; }

        /* 问题发现列表 */
        .issue-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .issue-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 14px 16px;
            background: rgba(255,255,255,0.5);
            border-radius: 8px;
            border-left: 4px solid #ff3355;
        }
        .issue-item .priority {
            font-weight: 800;
            font-size: 0.75rem;
            color: #ff3355;
            min-width: 32px;
        }
        .issue-item .content {
            flex: 1;
        }
        .issue-item .content .title {
            font-weight: 700;
            font-size: 0.95rem;
        }
        .issue-item .content .desc {
            font-size: 0.8rem;
            color: #444;
            margin-top: 2px;
        }
        .issue-item .content .tag {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 1px 8px;
            border-radius: 12px;
            margin-top: 4px;
        }
        .tag-high { background: rgba(255,51,85,0.12); color: #ff3355; }
        .tag-mid { background: rgba(255,165,2,0.12); color: #cc7a00; }
        .tag-low { background: rgba(16,172,132,0.12); color: #0e8a66; }

        /* 行动方案卡片 */
        .action-plan {
            background: rgba(255,255,255,0.7);
            border-radius: 8px;
            padding: 16px 18px;
            border: 1px solid rgba(15,17,21,0.04);
            height: 100%;
        }
        .action-plan .plan-title {
            font-weight: 800;
            font-size: 0.95rem;
            margin-bottom: 6px;
        }
        .action-plan .plan-tag {
            font-size: 0.7rem;
            font-weight: 700;
            color: #fff;
            background: #0f1115;
            padding: 1px 10px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 8px;
        }
        .action-plan ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .action-plan ul li {
            font-size: 0.8rem;
            padding: 4px 0 4px 20px;
            position: relative;
            color: #222;
            line-height: 1.4;
        }
        .action-plan ul li::before {
            content: "▸";
            position: absolute;
            left: 0;
            color: #ff3355;
            font-weight: 700;
        }

        /* 未来剧本 */
        .scenario-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .scenario-item {
            flex: 1;
            min-width: 180px;
            background: rgba(255,255,255,0.5);
            border-radius: 8px;
            padding: 16px 20px;
            border-top: 4px solid #747d8c;
            text-align: center;
        }
        .scenario-item .scenario-name {
            font-weight: 800;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        .scenario-item .scenario-prob {
            font-size: 1.6rem;
            font-weight: 900;
            font-family: 'Courier New', monospace;
        }
        .scenario-item .scenario-path {
            font-size: 0.7rem;
            color: #747d8c;
        }
        .scenario-item.best { border-top-color: #10ac84; }
        .scenario-item.worst { border-top-color: #ff3355; }
        .scenario-item.current { border-top-color: #0f1115; }

        /* 响应式 */
        @media (max-width: 1024px) {
            .grid-2col, .grid-3col, .grid-4col {
                grid-template-columns: 1fr 1fr;
            }
        }
        @media (max-width: 768px) {
            .grid-2col, .grid-3col, .grid-4col {
                grid-template-columns: 1fr;
            }
            .engine-header { flex-direction: column; align-items: flex-start; gap: 12px; }
            .engine-header .risk-badge { align-self: flex-start; }
            .strategy-card { padding: 16px; }
        }
    </style>
</head>

                </div>
            </div>
        </div>
    </section>

    <!-- ====== SECTION D: 个性化行动数据库 ====== -->
    <section>
        <div class="strategy-card">

            <div class="grid-3col" id="action-plans-container"></div>

    </section>

    <!-- ====== SECTION E: 数据驱动知识发现 ====== -->

                </div>
                <div>
                    <div class="chart-box short" id="chart-insight-oldpeak"></div>
                    <div style="font-size:0.75rem; color:#444; margin-top:4px;">ST段压低与患病风险</div>
                </div>
                <div>
                    <div class="chart-box short" id="chart-insight-hr"></div>
                    <div style="font-size:0.75rem; color:#444; margin-top:4px;">最大心率与患病率</div>
                </div>

                    <div style="font-size:0.75rem; color:#444; margin-top:4px;">血管阻塞数与风险</div>
                </div>
            </div>
        </div>
    </section>

    <!-- ====== SECTION F: 未来风险剧本 ====== -->
    <section>
        <div class="strategy-card">
            <div class="card-title">未来风险剧本 <span class="badge">场景推演</span></div>

                今天的选择 · 决定未来的位置
            </div>
        </div>
    </section>

</div>

        // 映射为中文名
        var data = top5.map(function(c) {

        };
        var colors = data.map(function(d) { return colorMap[d.name] || GREY; });

        donutChart.setOption({

    // ----- 2.2 风险画像摘要 -----
    function renderProfile(contrib, inputs, risk) {
        var tagsContainer = document.getElementById('risk-profile-tags');
        var descContainer = document.getElementById('risk-profile-desc');
        if (!tagsContainer || !descContainer) return;

        var tags = [];
        if (inputs.age > 60) tags.push({ label: '高龄风险', type: 'high' });
        if (inputs.thalach < 130) tags.push({ label: '心肺储备下降', type: 'high' });
        if (inputs.oldpeak > 2) tags.push({ label: '心肌缺血倾向', type: 'high' });
        if (inputs.ca >= 1) tags.push({ label: '冠脉异常', type: 'high' });
        if (inputs.chol > 240) tags.push({ label: '高胆固醇', type: 'mid' });
        if (inputs.trestbps > 140) tags.push({ label: '血压偏高', type: 'mid' });
        if (tags.length === 0) tags.push({ label: '目前无明显高危特征', type: 'low' });

        tagsContainer.innerHTML = tags.map(function(t) {
            var bg = t.type === 'high' ? 'rgba(255,51,85,0.12)' : (t.type === 'mid' ? 'rgba(255,165,2,0.12)' : 'rgba(16,172,132,0.12)');
            var color = t.type === 'high' ? '#ff3355' : (t.type === 'mid' ? '#cc7a00' : '#0e8a66');
            return '<span style="background:' + bg + '; color:' + color + '; padding:4px 14px; border-radius:20px; font-weight:700; font-size:0.8rem;">' + t.label + '</span>';
        }).join('');

        var sorted = contrib.slice().sort(function(a, b) {
            return Math.abs(b.val) - Math.abs(a.val);
        });
        var top = sorted[0];
        var topName = FEATURE_CN[top.name] || top.name;
        var desc = '当前风险主要由 <strong>' + topName + '</strong> 驱动（贡献 ' + Math.abs(top.val).toFixed(1) + '%）。';
        if (risk > 60) desc += ' 属于高风险人群，需积极干预。';
        else if (risk > 40) desc += ' 属于中风险人群，建议改善生活方式。';
        else desc += ' 属于低风险人群，维持良好习惯。';
        descContainer.innerHTML = desc;
    }

    function updateImpactChart() {
        var inputs = getInputs();
        var sliders = ['oldpeak', 'ca', 'thalach', 'chol', 'trestbps'];
        var newInputs = {};
        for (var key in inputs) {
            if (inputs.hasOwnProperty(key)) {
                newInputs[key] = inputs[key];
            }
        }
        sliders.forEach(function(key) {
            var el = document.getElementById('impact-slider-' + key);
            if (el) newInputs[key] = parseFloat(el.value);
        });

        var dom = document.getElementById('chart-impact');
        if (!dom) return;
        if (!impactChart) impactChart = echarts.init(dom);
        impactChart.resize();

        var baseRisk = calcRisk(inputs);
        var improvements = [];
        sliders.forEach(function(key) {
            var sliderEl = document.getElementById('impact-slider-' + key);
            var targetVal = sliderEl ? parseFloat(sliderEl.value) : inputs[key];
            var testInputs = {};
            for (var k in inputs) {
                if (inputs.hasOwnProperty(k)) {
                    testInputs[k] = inputs[k];
                }
            }
            testInputs[key] = targetVal;
            var riskAfter = calcRisk(testInputs);
            improvements.push({
                name: FEATURE_CN[key] || key,
                key: key,
                current: inputs[key],
                target: targetVal,
                riskReduction: baseRisk - riskAfter
            });
        });
        improvements.sort(function(a, b) {
            return b.riskReduction - a.riskReduction;
        });

        var names = improvements.map(function(i) { return i.name; });
        var currentRisk = baseRisk;

        var waterfallData = [{ name: '当前风险', value: currentRisk }];
        var cum = currentRisk;
        improvements.forEach(function(item) {
            cum -= item.riskReduction;
            waterfallData.push({ name: '↓' + item.name, value: cum });
        });

        impactChart.setOption({
            backgroundColor: 'transparent',
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'shadow' },
                formatter: function(params) {
                    var p = params[0];
                    var idx = p.dataIndex;
                    if (idx === 0) return '当前风险: ' + p.value.toFixed(1) + '%';
                    var item = improvements[idx - 1];
                    return item.name + ' 改善至 ' + item.target + ' <br/>风险降至 ' + p.value.toFixed(1) + '% (↓' + item.riskReduction.toFixed(1) + '%)';
                }
            },
            grid: { left: '10%', right: '6%', top: '8%', bottom: '12%', containLabel: true },
            xAxis: {
                type: 'category',
                data: waterfallData.map(function(d) { return d.name; }),
                axisLabel: { fontSize: 10, fontWeight: 700, color: PRIMARY }
            },
            yAxis: {
                type: 'value',
                min: 0,
                max: 100,
                axisLabel: { formatter: '{value}%', color: PRIMARY, fontWeight: 700 },
                splitLine: { lineStyle: { color: 'rgba(0,0,0,0.05)' } }
            },
            series: [{
                type: 'bar',
                data: waterfallData.map(function(d, idx) {
                    return {
                        value: d.value,
                        itemStyle: {
                            color: idx === 0 ? PRIMARY : (idx === waterfallData.length - 1 ? GREEN : RED)
                        }
                    };
                }),
                barWidth: 30,
                label: {
                    show: true,
                    position: 'top',
                    formatter: function(p) { return p.value.toFixed(1) + '%'; },
                    color: PRIMARY,
                    fontWeight: 700,
                    fontSize: 10
                }
            }]
        });
    }

    // ----- 2.7 未来风险剧本 -----
    function renderScenario(inputs, risk) {
        var baseline = risk;
        var pathA = [];
        var pathB = [];
        var pathC = [];
        var steps = 5;
        for (var i = 0; i < steps; i++) {
            pathA.push(Math.min(98, baseline + i * 2.5));
            var bVal = baseline - 15 * Math.exp(-i / 1.5) + i * 1.2;
            pathB.push(Math.max(10, Math.min(95, bVal)));
            var cVal = baseline - 20 * (1 - Math.exp(-i / 1.2));
            pathC.push(Math.max(5, Math.min(90, cVal)));
        }

        var container = document.getElementById('scenario-container');
        if (container) {
            container.innerHTML =
                '<div class="scenario-item worst">' +
                '<div class="scenario-name">保持现状</div>' +
                '<div class="scenario-prob">' + pathA[pathA.length - 1].toFixed(0) + '%</div>' +
                '<div class="scenario-path">5 年后风险</div></div>' +
                '<div class="scenario-item current">' +
                '<div class="scenario-name">核心干预</div>' +
                '<div class="scenario-prob">' + pathB[pathB.length - 1].toFixed(0) + '%</div>' +
                '<div class="scenario-path">5 年后风险</div></div>' +
                '<div class="scenario-item best">' +
                '<div class="scenario-name">全面改善</div>' +
                '<div class="scenario-prob">' + pathC[pathC.length - 1].toFixed(0) + '%</div>' +
                '<div class="scenario-path">5 年后风险</div></div>';
        }

        var dom = document.getElementById('chart-scenario');
        if (!dom) return;
        if (!scenarioChart) scenarioChart = echarts.init(dom);
        scenarioChart.resize();

        var times = ['现在', '2年', '4年', '6年', '8年', '10年'];
        scenarioChart.setOption({
            backgroundColor: 'transparent',
            tooltip: {
                trigger: 'axis',
                backgroundColor: PRIMARY,
                textStyle: { color: '#fff' },
                formatter: function(params) {
                    var html = '<b>' + params[0].axisValue + '</b><br/>';
                    params.forEach(function(p) {
                        html += p.marker + ' ' + p.seriesName + ': ' + p.value.toFixed(1) + '%<br/>';
                    });
                    return html;
                }
            },
            legend: {
                data: ['保持现状', '核心干预', '全面改善'],
                textStyle: { color: PRIMARY, fontWeight: 700, fontSize: 11 },
                top: 0
            },
            grid: { left: '8%', right: '6%', top: '18%', bottom: '12%', containLabel: true },
            xAxis: {
                type: 'category',
                data: times,
                axisLabel: { color: PRIMARY, fontWeight: 700 },
                axisLine: { lineStyle: { color: PRIMARY } }
            },
            yAxis: {
                type: 'value',
                min: 0,
                max: 100,
                axisLabel: { formatter: '{value}%', color: PRIMARY, fontWeight: 700 },
                splitLine: { lineStyle: { color: 'rgba(0,0,0,0.05)' } }
            },
            series: [
                {
                    name: '保持现状',
                    type: 'line',
                    smooth: true,
                    data: [baseline].concat(pathA),
                    lineStyle: { width: 3, color: RED },
                    symbol: 'circle',
                    symbolSize: 6,
                    itemStyle: { color: RED }
                },
                {
                    name: '核心干预',
                    type: 'line',
                    smooth: true,
                    data: [baseline].concat(pathB),
                    lineStyle: { width: 3, color: '#ffa502' },
                    symbol: 'diamond',
                    symbolSize: 8,
                    itemStyle: { color: '#ffa502' }
                },
                {
                    name: '全面改善',
                    type: 'line',
                    smooth: true,
                    data: [baseline].concat(pathC),
                    lineStyle: { width: 3, color: GREEN },
                    symbol: 'circle',
                    symbolSize: 6,
                    itemStyle: { color: GREEN }
                }
            ]
        });
    }

    // ================================================================
    // 3. 全局刷新
    // ================================================================
    function refreshAll(force) {
        if (force === undefined) force = false;
        var inputs = getInputs();
        if (!force && currentInputs) {
            var same = true;
            for (var f = 0; f < FEATURES.length; f++) {
                var key = FEATURES[f];
                if (inputs[key] !== currentInputs[key]) {
                    same = false;
                    break;
                }
            }
            if (same) return;
        }
        currentInputs = {};
        for (var k = 0; k < FEATURES.length; k++) {
            currentInputs[FEATURES[k]] = inputs[FEATURES[k]];
        }
        currentRisk = calcRisk(inputs);
        currentContrib = computeContrib(inputs);

        document.getElementById('header-risk').textContent = Math.round(currentRisk);

        renderDonut(currentContrib, currentRisk);
        renderProfile(currentContrib, inputs, currentRisk);
        renderIssues(inputs, currentRisk);
        renderImpactControls(inputs, currentRisk);
        updateImpactChart();
        renderActions(inputs);
        renderInsights();
        renderScenario(inputs, currentRisk);
    }

    // ================================================================
    // 4. 初始化 & 事件绑定
    // ================================================================
    function init() {
        refreshAll(true);

        setInterval(function() { refreshAll(false); }, 400);

        window.addEventListener('resize', function() {
            if (donutChart) donutChart.resize();
            if (impactChart) impactChart.resize();
            if (scenarioChart) scenarioChart.resize();
            insightCharts.forEach(function(c) { if (c) c.resize(); });
        });
    }

    if (window.echarts) {
        init();
    } else {
        var timer = setInterval(function() {
            if (window.echarts) {
                clearInterval(timer);
                init();
            }
        }, 30);
    }

})();
</script>
</body>
